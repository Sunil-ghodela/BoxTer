# Builds installers on macOS, Linux, and Windows runners and uploads them
# to the matching GitHub Release. Triggered by any tag that looks like v*.
#
# Cutting a release:
#   1. Bump "version" in package.json
#   2. git commit -am "Release v1.0.0"
#   3. git tag v1.0.0 && git push --follow-tags
#
# The first run creates a draft release. Review artifacts, then publish it
# from the Releases page. Users can download from that page directly, or
# (Mac) install via `brew install --cask boxter` once the cask is updated.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Package & publish (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --publish always

      - name: Package & publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --publish always

      - name: Package & publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional — when these two secrets are set, electron-builder will
          # sign the Windows installer with your code-signing cert (removes the
          # SmartScreen "unknown publisher" warning). Leave unset to ship
          # unsigned.
          #   WIN_CSC_LINK: base64-encoded .pfx  OR  an https URL to the .pfx
          #   WIN_CSC_KEY_PASSWORD: password for the .pfx
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --publish always
